name: Core Tests

on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Install jextract
        run: |
          curl -L -o jextract.tar.gz https://download.java.net/java/early_access/jextract/22/6/openjdk-22-jextract+6-47_linux-x64_bin.tar.gz
          mkdir -p "$HOME/jextract"
          tar -xzf jextract.tar.gz -C "$HOME/jextract" --strip-components=1
          echo "$HOME/jextract/bin" >> "$GITHUB_PATH"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run core tests
        run: ./gradlew :core:test
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
